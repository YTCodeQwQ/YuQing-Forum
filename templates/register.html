{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}

<div style="max-width:400px;margin:60px auto;background:#fff;border:1px solid #e4e4e4;border-radius:8px;padding:28px 24px">
  <h2 style="text-align:center;margin-bottom:20px;font-size:20px;font-weight:700">注册</h2>

  <div id="regError" style="display:none;background:#fff0f0;border:1px solid #fdd;color:#c00;padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:14px"></div>
  <div id="regSuccess" style="display:none;background:#f0fff0;border:1px solid #dfd;color:#270;padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:14px"></div>

  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="用于登录（3-20字符）">
  </div>
  <div class="form-group">
    <label>昵称</label>
    <input type="text" id="nickname" placeholder="显示名称">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="至少6位">
  </div>
  <div class="form-group">
    <label>确认密码</label>
    <input type="password" id="password2" placeholder="再输一次" onkeydown="if(event.key==='Enter')doRegister()">
  </div>
  <button class="btn btn-block" onclick="doRegister()" style="background:#1a73e8;padding:12px;border-radius:6px;color:#fff">注册</button>
  <div style="text-align:center;margin-top:16px;font-size:14px;color:#888">
    已有账号？<a href="/login">登录</a>
  </div>
</div>

<script>
function doRegister() {
  var u = document.getElementById('username').value.trim();
  var n = document.getElementById('nickname').value.trim();
  var p = document.getElementById('password').value;
  var p2 = document.getElementById('password2').value;
  document.getElementById('regError').style.display = 'none';
  document.getElementById('regSuccess').style.display = 'none';
  if (!u || !n || !p) {
    document.getElementById('regError').textContent = '所有字段都不能为空';
    document.getElementById('regError').style.display = 'block';
    return;
  }
  if (p !== p2) {
    document.getElementById('regError').textContent = '两次密码不一致';
    document.getElementById('regError').style.display = 'block';
    return;
  }
  fetch('/api/register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username:u, nickname:n, password:p})
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success) {
        document.getElementById('regSuccess').textContent = '注册成功！即将跳转到登录页...';
        document.getElementById('regSuccess').style.display = 'block';
        setTimeout(function(){ location.href='/login'; }, 1500);
      } else {
        document.getElementById('regError').textContent = d.error || '注册失败';
        document.getElementById('regError').style.display = 'block';
      }
    });
}
</script>

{% endblock %}
