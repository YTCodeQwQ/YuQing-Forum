{% extends "admin/base.html" %}
{% block content %}
<div class="card">
    <h2>✏️ 编辑版块</h2>
    <form method="POST">
        <div class="form-group">
            <label>名称</label>
            <input type="text" name="name" value="{{ board[2] }}" required>
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description">{{ board[3] }}</textarea>
        </div>
        <div class="form-group">
            <label>图标 (emoji)</label>
            <input type="text" name="icon" value="{{ board[5] }}">
        </div>
        <div class="form-group">
            <label>颜色代码</label>
            <input type="text" name="color" value="{{ board[4] }}" placeholder="#e07a5f">
        </div>
        <div class="form-group">
            <label>排序权重</label>
            <input type="number" name="sort_order" value="{{ board[7] }}" min="0">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/admin/boards" class="btn btn-ghost">取消</a>
    </form>
</div>
{% endblock %}
