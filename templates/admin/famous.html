{% extends "admin/base.html" %}
{% block content %}
<div class="card">
    <h2>⭐ 风云榜管理</h2>
    
    <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
        <form method="post" action="/admin/famous/add" style="display: flex; gap: 10px; align-items: flex-end;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">用户ID</label>
                <input type="number" name="user_id" placeholder="输入用户ID" required>
            </div>
            <div style="flex: 2;">
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">上榜理由</label>
                <input type="text" name="reason" placeholder="输入上榜理由" required>
            </div>
            <button type="submit" class="btn btn-primary">添加</button>
        </form>
    </div>
    
    <table>
        <tr>
            <th>ID</th>
            <th>用户</th>
            <th>等级</th>
            <th>理由</th>
            <th>添加时间</th>
            <th>操作</th>
        </tr>
        {% for f in famous_users %}
        <tr>
            <td>{{ f[0] }}</td>
            <td><a href="/user/{{ f[1] }}" target="_blank">{{ f[4] or '用户'+f[1]|string }}</a></td>
            <td>Lv{{ f[5] or 0 }}</td>
            <td>{{ f[2] }}</td>
            <td>{{ f[3][:10] }}</td>
            <td>
                <a href="#" class="btn btn-danger btn-sm" onclick="return false" data-action="delete" data-id="{{ f[0] }}">删除</a>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="6" style="text-align:center;color:#888">暂无数据</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', function() {
        const id = this.dataset.id;
        if (confirm('确认从风云榜移除？')) {
            fetch('/admin/famous/' + id + '/delete', { method: 'POST' })
                .then(r => r.json())
                .then(d => location.reload())
                .catch(e => alert('操作失败'));
        }
    });
});
</script>
{% endblock %}
