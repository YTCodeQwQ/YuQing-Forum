{% extends "admin/base.html" %}
{% block content %}
<div class="card">
    <h2>🏷️ 标签管理</h2>
    
    <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px;">
        <form id="addTagForm" style="display: flex; gap: 10px; align-items: flex-end;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">标签名</label>
                <input type="text" id="tagName" placeholder="输入标签名" required style="padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-weight: 500;">颜色</label>
                <input type="color" id="tagColor" value="#888888" style="width: 50px; height: 36px; border: none; cursor: pointer;">
            </div>
            <button type="submit" class="btn btn-primary">添加标签</button>
        </form>
    </div>
    
    <table>
        <tr>
            <th>ID</th>
            <th>标签名</th>
            <th>颜色</th>
            <th>用户数</th>
            <th>操作</th>
        </tr>
        {% for tag in tags %}
        <tr>
            <td>{{ tag[0] }}</td>
            <td>
                <span class="tag-badge" style="display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; background: {{ tag[2] }}; color: #fff; border-radius: 12px; font-size: 12px;">
                    {{ tag[1] }}
                </span>
            </td>
            <td>
                <span style="display: inline-block; width: 20px; height: 20px; background: {{ tag[2] }}; border-radius: 4px; vertical-align: middle;"></span>
                <code style="margin-left: 5px; font-size: 12px;">{{ tag[2] }}</code>
            </td>
            <td>{{ tag_counts[tag[0]] }} 人</td>
            <td>
                <button class="btn btn-ghost btn-sm" onclick="editTag({{ tag[0] }}, '{{ tag[1] }}', '{{ tag[2] }}')">编辑</button>
                <button class="btn btn-danger btn-sm" onclick="deleteTag({{ tag[0] }}, '{{ tag[1] }}')">删除</button>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5" style="text-align:center;color:#888">暂无标签</td></tr>
        {% endfor %}
    </table>
</div>

<!-- 编辑弹窗 -->
<div id="editModal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: #fff; padding: 20px; border-radius: 8px; width: 300px;">
        <h3 style="margin-bottom: 15px;">编辑标签</h3>
        <form id="editTagForm">
            <input type="hidden" id="editTagId">
            <div style="margin-bottom: 10px;">
                <label style="display: block; margin-bottom: 5px;">标签名</label>
                <input type="text" id="editTagName" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">颜色</label>
                <input type="color" id="editTagColor" style="width: 100%; height: 40px; border: none; cursor: pointer;">
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-ghost" onclick="closeEditModal()">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
const addForm = document.getElementById('addTagForm');
addForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('tagName').value;
    const color = document.getElementById('tagColor').value;
    
    fetch('/admin/tag/add', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'name=' + encodeURIComponent(name) + '&color=' + encodeURIComponent(color)
    })
    .then(r => r.json())
    .then(d => { if (d.success) location.reload(); else alert(d.error); })
    .catch(e => alert('添加失败'));
});

function editTag(id, name, color) {
    document.getElementById('editTagId').value = id;
    document.getElementById('editTagName').value = name;
    document.getElementById('editTagColor').value = color;
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
}

document.getElementById('editTagForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = document.getElementById('editTagId').value;
    const name = document.getElementById('editTagName').value;
    const color = document.getElementById('editTagColor').value;
    
    fetch('/admin/tag/' + id + '/edit', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'name=' + encodeURIComponent(name) + '&color=' + encodeURIComponent(color)
    })
    .then(r => r.json())
    .then(d => { if (d.success) location.reload(); else alert('保存失败'); })
    .catch(e => alert('保存失败'));
});

function deleteTag(id, name) {
    if (confirm('确认删除标签 "' + name + '"？用户保留但会解除关联。')) {
        fetch('/admin/tag/' + id + '/delete', { method: 'POST' })
            .then(r => r.json())
            .then(d => { if (d.success) location.reload(); else alert('删除失败'); });
    }
}
</script>
{% endblock %}
